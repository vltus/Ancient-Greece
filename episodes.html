<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - The Wonders of Ancient Greece</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="images/logo.png" alt="VLTUS" class="nav-logo me-2">
                    Ancient Greece
                </a>
                <div class="ms-auto d-flex gap-2">
                    <a href="about.html" class="nav-btn">About</a>
                    <a href="episodes.html" class="nav-btn active">Episodes</a>
                </div>
            </div>
        </nav>
        <div class="laurel-strip"></div>
    </header>

    <div class="container my-5 nav-spacer">
        <div class="text-center mb-5 reveal">
            <p class="page-eyebrow mb-1">Educational Series</p>
            <h1 class="page-title display-5">Episodes</h1>
            <p class="lead text-muted mt-2">Interactive video episodes &mdash; press Watch to play</p>
        </div>

        <div class="row g-4" id="episodes-container">
            <!-- Episodes populated by JS -->
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content video-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="videoModalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <video id="episodePlayer" controls playsinline style="width: 100%; display: block;"></video>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2026 The Wonders of Ancient Greece &mdash; part of <a href="https://tobyhall.uk">tobyhall.uk</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const episodes = [
            { number: "Episode one", title: "The Chariot Races", image: "chariot-racing.png", video: "https://videos.ancient.greece.tobyhall.uk/chariot%20racing.MP4", description: "Experience the thrill of ancient Olympic chariot racing.", available: true },
            { number: "Episode two", title: "A Tour Around Acropolis", image: "acropolis.png", video: "https://videos.ancient.greece.tobyhall.uk/acropolis.MP4", description: "Walk through the magnificent Acropolis of Athens.", available: true },
            { number: "Episode three", title: "The Trojan Horse", image: "trojan-horse.png", video: "https://videos.ancient.greece.tobyhall.uk/troy.MP4", description: "The legendary story of the fall of Troy.", available: true },
            { number: "Coming soon", title: "The Naval Harbour", image: "naval-harbour.png", video: null, description: "Life and trade at a bustling ancient Greek harbour.", available: false },
            { number: "Coming soon", title: "Spartan Training", image: "spartan-training.png", video: null, description: "Inside the legendary agoge of ancient Sparta.", available: false }
        ];

        function renderEpisodes() {
            const container = document.getElementById('episodes-container');
            container.innerHTML = '';

            episodes.forEach((ep, i) => {
                const html = `
                <div class="col-lg-4 col-md-6 reveal d${(i % 3) + 1}">
                    <div class="product-card">
                        <div class="preview-wrapper">
                            <img src="images/${ep.image}" class="product-image" alt="${ep.title}">
                        </div>
                        <div class="card-body">
                            <p class="episode-eyebrow">${ep.number}</p>
                            <h5 class="card-title">${ep.title}</h5>
                            <p class="card-text">${ep.description}</p>
                            <div>
                            ${ep.available
                                ? `<button onclick="playEpisode(${i})" class="btn-watch">&#9654;&#xFE0E; Watch Episode</button>`
                                : `<button class="btn-soon" disabled>Coming Soon</button>`}
                            </div>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        }

        function playEpisode(i) {
            const ep = episodes[i];
            const player = document.getElementById('episodePlayer');
            document.getElementById('videoModalTitle').textContent = ep.number + ": " + ep.title;
            player.src = ep.video;
            const modal = new bootstrap.Modal(document.getElementById('videoModal'));
            modal.show();
            player.play();
        }

        // Stop playback when the modal closes
        document.getElementById('videoModal').addEventListener('hidden.bs.modal', () => {
            const player = document.getElementById('episodePlayer');
            player.pause();
            player.removeAttribute('src');
            player.load();
        });

        renderEpisodes();
    </script>
    <script src="reveal.js"></script>
</body>
</html>
