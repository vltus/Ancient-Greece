<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - The Wonders of Ancient Greece</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html"><img src="images/logo.png" alt="VLTUS" class="nav-logo me-2">🏛️ Ancient Greece</a>
            <div class="ms-auto">
                <a href="about.html" class="btn btn-outline-dark me-2">About</a>
                <a href="episodes.html" class="btn btn-outline-danger">Episodes</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 pt-5 nav-spacer">
        <h1 class="text-center mb-4 display-5 fw-bold text-dark">Ancient Greece Educational Series</h1>
        <p class="text-center lead mb-5 text-muted">Interactive Video Episodes &mdash; Hover a card to preview</p>

        <div class="row g-4" id="episodes-container">
            <!-- Episodes populated by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 The Wonders of Ancient Greece &mdash; part of <a href="https://tobyhall.uk" class="text-warning text-decoration-none">tobyhall.uk</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const episodes = [
            { number: "Episode one", title: "The Chariot Races", image: "chariot-racing.png", description: "Experience the thrill of ancient Olympic chariot racing.", available: true },
            { number: "Episode two", title: "A Tour Around Acropolis", image: "acropolis.png", description: "Walk through the magnificent Acropolis of Athens.", available: true },
            { number: "Episode three", title: "The Trojan Horse", image: "trojan-horse.png", description: "The legendary story of the fall of Troy.", available: true },
            { number: "Coming soon", title: "The Naval Harbour", image: "naval-harbour.png", description: "Life and trade at a bustling ancient Greek harbour.", available: false },
            { number: "Coming soon", title: "Spartan Training", image: "spartan-training.png", description: "Inside the legendary agoge of ancient Sparta.", available: false }
        ];

        function renderEpisodes() {
            const container = document.getElementById('episodes-container');
            container.innerHTML = '';

            episodes.forEach(ep => {
                const previewVideo = ep.image.toLowerCase().replace('.png', '-preview.mp4');
                const html = `
                <div class="col-lg-4 col-md-6">
                    <div class="product-card">
                        <div class="preview-wrapper">
                            <img src="images/${ep.image}" class="product-image" alt="${ep.title}">
                            <video class="product-video" muted loop playsinline>
                                <source src="images/${previewVideo}" type="video/mp4">
                            </video>
                        </div>
                        <div class="card-body">
                            <h6 class="text-muted mb-1">${ep.number}</h6>
                            <h5 class="card-title">${ep.title}</h5>
                            <p class="card-text text-muted">${ep.description}</p>
                            ${ep.available
                                ? '<small class="text-success d-block mt-2">&#10003; Available now</small>'
                                : '<span class="text-muted fst-italic mt-2 d-block">Coming Soon</span>'}
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        }

        // Hover preview
        document.addEventListener('mouseover', e => {
            const card = e.target.closest('.product-card');
            if (card) {
                const img = card.querySelector('.product-image');
                const video = card.querySelector('.product-video');
                if (video && img) {
                    img.style.opacity = '0';
                    video.style.opacity = '1';
                    video.play();
                }
            }
        });

        document.addEventListener('mouseout', e => {
            const card = e.target.closest('.product-card');
            if (card) {
                const img = card.querySelector('.product-image');
                const video = card.querySelector('.product-video');
                if (video && img) {
                    video.pause();
                    video.currentTime = 0;
                    video.style.opacity = '0';
                    img.style.opacity = '1';
                }
            }
        });

        renderEpisodes();
    </script>
</body>
</html>
