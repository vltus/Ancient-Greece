<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ Ancient Greece</a>
            <div class="ms-auto">
                <a href="shop.html" class="btn btn-primary me-2">Browse More</a>
                <a href="cart.html" class="btn btn-outline-danger">Cart</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 pt-5">
        <h1 class="text-center mb-2">My Library</h1>
        <p class="text-center text-muted mb-5">Your purchased episodes</p>
        <div id="library-content" class="row g-4"></div>
    </div>

    <script>
        const libraryProducts = [
            { id: 1, title: "The Chariot Races", image: "chariot-racing.png", description: "Experience the thrill...", fullVideo: "chariot-racing-full.mp4" },
            { id: 2, title: "A Tour Around Acropolis", image: "acropolis.png", description: "Walk through the magnificent...", fullVideo: "acropolis-full.mp4" },
            { id: 3, title: "The Trojan Horse", image: "trojan-horse.png", description: "The legendary story...", fullVideo: "trojan-horse-full.mp4" }
        ];

        function renderLibrary() {
            const purchased = JSON.parse(localStorage.getItem('library') || '[]');
            const allItems = [...libraryProducts, ...purchased];
            const container = document.getElementById('library-content');
            
            container.innerHTML = allItems.map(item => `
                <div class="col-lg-4 col-md-6">
                    <div class="product-card" onclick="watchEpisode('${item.title}', 'images/${item.fullVideo || item.image.replace('.png','')}-full.mp4')">
                        <div class="preview-wrapper">
                            <img src="images/${item.image}" class="product-image" alt="${item.title}">
                        </div>
                        <div class="card-body">
                            <h5>${item.title}</h5>
                            <p class="text-muted">${item.description || 'Full episode'}</p>
                            <button class="btn btn-primary w-100 mt-3">▶ Watch Now</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function watchEpisode(title, videoSrc) {
            const modalHTML = `
                <div class="modal fade show" style="display:block; background:rgba(0,0,0,0.9);">
                    <div class="modal-dialog modal-xl">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5>${title}</h5>
                                <button onclick="this.closest('.modal').remove()" class="btn-close"></button>
                            </div>
                            <div class="modal-body p-0">
                                <video class="w-100" controls autoplay>
                                    <source src="${videoSrc}" type="video/mp4">
                                </video>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        renderLibrary();
    </script>
</body>
</html>
