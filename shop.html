<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Ancient Greece Series</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ Ancient Greece</a>
            <div class="ms-auto">
                <a href="shop.html" class="btn btn-outline-dark me-2">Shop</a>
                <a href="cart.html" class="btn btn-outline-danger position-relative">
                    🛒 Cart <span id="cart-count" class="badge bg-danger">0</span>
                </a>
                <a href="my-library.html" class="btn btn-outline-success ms-2">My Library</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 pt-5">
        <h1 class="text-center mb-4 display-5 fw-bold">Ancient Greece Educational Series</h1>
        <p class="text-center lead mb-5 text-muted">Interactive Video Episodes — Instant Digital Download</p>

        <div id="success-msg" class="alert alert-success text-center d-none"></div>

        <div class="text-center mb-4">
            <button onclick="toggleFilter()" id="filter-btn" class="btn btn-outline-danger btn-lg">
                Show Available Episodes Only
            </button>
        </div>

        <div class="row g-4" id="products-container">
            <!-- Products populated by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const products = [
            { id: 1, title: "The Chariot Races", price: 9.99, image: "chariot-racing.png", description: "Experience the thrill of ancient Olympic chariot racing." },
            { id: 2, title: "A Tour Around Acropolis", price: 12.99, image: "acropolis.png", description: "Walk through the magnificent Acropolis of Athens." },
            { id: 3, title: "The Trojan Horse", price: 8.99, image: "trojan-horse.png", description: "The legendary story of the fall of Troy." }
        ];

        function renderProducts(filtered = products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            filtered.forEach(product => {
                const previewVideo = product.image.toLowerCase().replace('.png', '-preview.mp4');
                const html = `
                    <div class="col-lg-4 col-md-6 product-item">
                        <div class="product-card">
                            <div class="preview-wrapper">
                                <img src="images/${product.image}" class="product-image" alt="${product.title}">
                                <video class="product-video" muted loop playsinline>
                                    <source src="images/${previewVideo}" type="video/mp4">
                                </video>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${product.title}</h5>
                                <p class="card-text text-muted">${product.description}</p>
                                <div class="d-flex justify-content-between align-items-end mt-4">
                                    <div><span class="price">£${product.price.toFixed(2)}</span></div>
                                    <button onclick="addToCart(${product.id})" class="btn btn-primary btn-sm">Add to Cart</button>
                                </div>
                                <small class="text-success d-block mt-2">✓ Instant Digital Download</small>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += html;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            if (!cart.find(item => item.id === id)) {
                cart.push(product);
                localStorage.setItem('cart', JSON.stringify(cart));
                document.getElementById('success-msg').textContent = `✅ ${product.title} added to cart!`;
                document.getElementById('success-msg').classList.remove('d-none');
                setTimeout(() => document.getElementById('success-msg').classList.add('d-none'), 3000);
            }
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            document.getElementById('cart-count').textContent = cart.length;
        }

        // Filter (static for demo)
        let showOnlyAvailable = true;
        function toggleFilter() {
            showOnlyAvailable = !showOnlyAvailable;
            document.getElementById('filter-btn').textContent = showOnlyAvailable ? "Show All Episodes" : "Show Available Episodes Only";
            renderProducts();
        }

        // Hover preview
        document.addEventListener('mouseover', e => {
            if (e.target.closest('.product-card')) {
                const card = e.target.closest('.product-card');
                const img = card.querySelector('.product-image');
                const video = card.querySelector('.product-video');
                if (video) {
                    img.style.opacity = '0';
                    video.style.opacity = '1';
                    video.play();
                }
            }
        });

        document.addEventListener('mouseout', e => {
            if (e.target.closest('.product-card')) {
                const card = e.target.closest('.product-card');
                const img = card.querySelector('.product-image');
                const video = card.querySelector('.product-video');
                if (video) {
                    video.pause();
                    video.currentTime = 0;
                    video.style.opacity = '0';
                    img.style.opacity = '1';
                }
            }
        });

        renderProducts();
        updateCartCount();
    </script>
</body>
</html>
