<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ Ancient Greece</a>
            <div class="ms-auto">
                <a href="shop.html" class="btn btn-outline-dark me-2">Continue Shopping</a>
                <a href="my-library.html" class="btn btn-outline-success">My Library</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 pt-5">
        <h1 class="mb-4">Your Cart</h1>
        <div id="cart-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cart-content');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center p-5">
                        <h4>Your cart is empty</h4>
                        <a href="shop.html" class="btn btn-primary">Browse Episodes</a>
                    </div>`;
                return;
            }

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let html = `
                <div class="row">
                    <div class="col-lg-8">
                        <table class="table">
                            <thead><tr><th>Episode</th><th>Price</th><th></th></tr></thead>
                            <tbody>`;
            
            cart.forEach((item, index) => {
                html += `
                    <tr>
                        <td>${item.title}</td>
                        <td>£${item.price.toFixed(2)}</td>
                        <td><button onclick="removeFromCart(${index})" class="btn btn-sm btn-outline-danger">Remove</button></td>
                    </tr>`;
            });

            html += `</tbody></table></div>
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-body">
                            <h5>Total: £${total.toFixed(2)}</h5>
                            <button onclick="checkout()" class="btn btn-success btn-lg w-100 mt-4">✅ Complete Purchase</button>
                        </div>
                    </div>
                </div>
            </div>`;
            container.innerHTML = html;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let library = JSON.parse(localStorage.getItem('library') || '[]');
            
            library = [...library, ...cart];
            localStorage.setItem('library', JSON.stringify(library));
            localStorage.removeItem('cart');

            alert("✅ Purchase successful! Episodes added to your library.");
            window.location.href = "my-library.html";
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const el = document.getElementById('cart-count');
            if (el) el.textContent = cart.length;
        }

        renderCart();
    </script>
</body>
</html>
